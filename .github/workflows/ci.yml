name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Typecheck + Test (bloqueante)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund
        env:
          # postinstall roda `prisma generate` que precisa de DATABASE_URL para parsear o schema
          DATABASE_URL: "postgresql://placeholder:placeholder@placeholder:5432/placeholder"

      # Gate 1: tipos. tsconfig strict — pega a maioria dos erros que importam.
      - name: TypeScript type-check (bloqueante)
        run: npx tsc --noEmit
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@placeholder:5432/placeholder"
          AUTH_SECRET: "test_secret_min_32_chars_for_ci_only____"
          NEXTAUTH_SECRET: "test_secret_min_32_chars_for_ci_only____"

      # Gate 2: testes. AGORA BLOQUEANTE — um teste vermelho reprova o PR/push.
      # São os testes de regressão que congelam as correções do dogfood (Fase 2).
      - name: Unit tests (Vitest) — bloqueante
        run: npm test
        env:
          NODE_ENV: test
          DATABASE_URL: "postgresql://placeholder:placeholder@placeholder:5432/placeholder"
          AUTH_SECRET: "test_secret_min_32_chars_for_ci_only____"
          NEXTAUTH_SECRET: "test_secret_min_32_chars_for_ci_only____"

      # NOTA: o passo de ESLint foi REMOVIDO temporariamente. O projeto usa
      # .eslintrc.json (formato legado) mas tem ESLint v9 instalado, que exige
      # flat config (eslint.config.mjs) — `next lint` (deprecado no Next 16)
      # mascarava a falha e o CI usava continue-on-error (lint nunca bloqueava
      # de verdade). DÍVIDA: migrar para flat config e religar como gate.
      # Ver docs/superpowers/specs/2026-06-01-plano-prevencao-bugs.md (Fase 3).
