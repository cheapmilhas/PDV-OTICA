name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Typecheck + Test (bloqueante)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Postgres efêmero p/ o drift check do Prisma (Gate 3). Não guarda dados —
    # serve só de shadow DB para `prisma migrate diff` replayar as migrations.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci_shadow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund
        env:
          # postinstall roda `prisma generate` que precisa de DATABASE_URL para parsear o schema
          DATABASE_URL: "postgresql://placeholder:placeholder@placeholder:5432/placeholder"

      # Gate 1: tipos. tsconfig strict — pega a maioria dos erros que importam.
      - name: TypeScript type-check (bloqueante)
        run: npx tsc --noEmit
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@placeholder:5432/placeholder"
          AUTH_SECRET: "test_secret_min_32_chars_for_ci_only____"
          NEXTAUTH_SECRET: "test_secret_min_32_chars_for_ci_only____"

      # Gate 2: testes. AGORA BLOQUEANTE — um teste vermelho reprova o PR/push.
      # São os testes de regressão que congelam as correções do dogfood (Fase 2).
      - name: Unit tests (Vitest) — bloqueante
        run: npm test
        env:
          NODE_ENV: test
          DATABASE_URL: "postgresql://placeholder:placeholder@placeholder:5432/placeholder"
          AUTH_SECRET: "test_secret_min_32_chars_for_ci_only____"
          NEXTAUTH_SECRET: "test_secret_min_32_chars_for_ci_only____"

      # Gate 3: DRIFT de schema (Q8.4). Detecta quando prisma/schema.prisma e as
      # migrations divergiram — ex.: alguém alterou o schema sem gerar a migration
      # correspondente (ou vice-versa). Replaya as migrations no Postgres efêmero
      # (service container) e compara com o datamodel do schema; --exit-code
      # retorna !=0 se houver diferença.
      #
      # ADVISORY (continue-on-error) POR ORA: índices FUNCIONAIS criados só no SQL
      # (ex.: User_companyId_email_unique e Customer_companyId_email_unique, ambos
      # com lower(email)) NÃO são representáveis como @@unique no schema, então o
      # diff os reporta como "diferença" — é esperado, não é drift real. Mantido
      # informativo até filtrarmos esses índices conhecidos. Ainda assim aponta
      # divergências reais nos logs. DÍVIDA: tornar bloqueante com allowlist.
      - name: Prisma schema drift check (advisory)
        continue-on-error: true
        run: |
          npx prisma migrate diff \
            --from-migrations prisma/migrations \
            --to-schema-datamodel prisma/schema.prisma \
            --shadow-database-url "$SHADOW_DATABASE_URL" \
            --exit-code
        env:
          # Banco efêmero do service container acima (replay das migrations).
          SHADOW_DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci_shadow"

      # NOTA: o passo de ESLint foi REMOVIDO temporariamente. O projeto usa
      # .eslintrc.json (formato legado) mas tem ESLint v9 instalado, que exige
      # flat config (eslint.config.mjs) — `next lint` (deprecado no Next 16)
      # mascarava a falha e o CI usava continue-on-error (lint nunca bloqueava
      # de verdade). DÍVIDA: migrar para flat config e religar como gate.
      # Ver docs/superpowers/specs/2026-06-01-plano-prevencao-bugs.md (Fase 3).
