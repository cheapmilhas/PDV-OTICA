name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund
        env:
          # postinstall roda `prisma generate` que precisa de DATABASE_URL para parsear o schema
          DATABASE_URL: "postgresql://placeholder:placeholder@placeholder:5432/placeholder"

      - name: TypeScript type-check
        run: npx tsc --noEmit
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@placeholder:5432/placeholder"
          AUTH_SECRET: "test_secret_min_32_chars_for_ci_only____"
          NEXTAUTH_SECRET: "test_secret_min_32_chars_for_ci_only____"

      - name: Unit tests (Vitest)
        run: npm test
        env:
          NODE_ENV: test
          DATABASE_URL: "postgresql://placeholder:placeholder@placeholder:5432/placeholder"
          AUTH_SECRET: "test_secret_min_32_chars_for_ci_only____"
          NEXTAUTH_SECRET: "test_secret_min_32_chars_for_ci_only____"

      - name: ESLint
        run: npm run lint
        continue-on-error: true
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@placeholder:5432/placeholder"
